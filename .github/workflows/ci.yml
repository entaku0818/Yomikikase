name: CI (iOS)

on:
  push:
    branches: [ main ]
    paths:
      - 'iOS/**'
      - '.swiftlint.yml'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'iOS/**'
      - '.swiftlint.yml'
      - '.github/workflows/ci.yml'

jobs:
  swiftlint:
    runs-on: ubuntu-latest
    container: ghcr.io/realm/swiftlint:0.57.0
    steps:
      - uses: actions/checkout@v4
      - name: Run SwiftLint
        run: swiftlint lint --reporter github-actions-logging

  build-and-test:
    runs-on: macos-26
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      # CIでは課金・広告は使わないためダミーキーで xcconfig を生成する
      # （実キーは Xcode Cloud / ローカルのみ。ci_scripts/ci_post_clone.sh と同じ形式）
      - name: Generate xcconfig with CI dummy keys
        run: |
          mkdir -p iOS/VoiceYourText/config
          cat > iOS/VoiceYourText/config/Debug.xcconfig << 'EOF'
          REVENUECAT_API_KEY = CI_DUMMY_KEY
          ADMOB_BANNER_ID = ca-app-pub-3940256099942544/2435281174
          AUDIO_API_BASE_URL = https:$()/$()/voiceyourtext-tts-990821915106.asia-northeast1.run.app
          CLOUDRUN_API_KEY = CI_DUMMY_KEY
          EOF
          cp iOS/VoiceYourText/config/Debug.xcconfig iOS/VoiceYourText/config/Release.xcconfig

      - name: Cache SPM packages
        uses: actions/cache@v4
        with:
          path: iOS/SourcePackages
          key: spm-${{ runner.os }}-${{ hashFiles('iOS/VoiceYourText.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}
          restore-keys: |
            spm-${{ runner.os }}-

      # デバイス名は Xcode バージョンで変わるため UDID で動的に選択する
      - name: Select iPhone simulator
        id: sim
        run: |
          UDID=$(xcrun simctl list devices available --json \
            | jq -r '[.devices[] | .[] | select(.isAvailable and (.name | startswith("iPhone")))][0].udid')
          test -n "$UDID" && test "$UDID" != "null"
          echo "Selected simulator: $UDID"
          echo "udid=$UDID" >> "$GITHUB_OUTPUT"

      - name: Build and test on simulator
        working-directory: iOS
        run: |
          set -o pipefail
          xcodebuild test \
            -project VoiceYourText.xcodeproj \
            -scheme VoiceYourText \
            -destination "id=${{ steps.sim.outputs.udid }}" \
            -clonedSourcePackagesDirPath SourcePackages \
            -skip-testing:VoiceYourTextUITests \
            CODE_SIGNING_ALLOWED=NO
