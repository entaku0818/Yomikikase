name: PaywallAnalytics Tests

on:
  push:
    branches: [ main ]
    paths:
      - 'iOS/LocalPackages/PaywallAnalytics/**'
      - '.github/workflows/test-paywall-analytics.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'iOS/LocalPackages/PaywallAnalytics/**'
      - '.github/workflows/test-paywall-analytics.yml'

jobs:
  swift-test:
    # MLX 非依存の純 SPM パッケージなのでシミュレータ不要。
    # アプリ全体は mlx-swift が実機専用 Metal シンボルを参照するためシミュレータでリンクできないが、
    # このパッケージは host(macOS) 上で swift test が通る。
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Show Swift version
        run: swift --version
      - name: Run swift test
        working-directory: iOS/LocalPackages/PaywallAnalytics
        run: swift test
